name: Android Release APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Run unit tests and build release APK
        run: gradle --no-daemon testDebugUnitTest assembleRelease

      - name: Rename APK for delivery
        run: |
          mkdir -p dist
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)
          test -n "$APK_PATH"
          cp "$APK_PATH" dist/app-arm64-v8a-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: dist/app-arm64-v8a-release.apk
          if-no-files-found: error
