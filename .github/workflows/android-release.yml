name: Android Release APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-zig-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c
          add-to-path: true
          link-to-sdk: true

      - name: Build Zig core for Android
        env:
          NDK_PATH: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd native/zig
          # Set up Android sysroot for libc
          export ZIG_TARGET_MCPU=generic
          export ZIG_LIBC="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          # Build for Android arm64 with bundled libc
          zig build -Dtarget=aarch64-linux-android
          mkdir -p ../../app/src/main/jniLibs/arm64-v8a
          cp zig-out/lib/libcclaudeclaw.so ../../app/src/main/jniLibs/arm64-v8a/

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: zig-native-lib
          path: app/src/main/jniLibs/arm64-v8a/libcclaudeclaw.so

  build-apk:
    needs: build-zig-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: zig-native-lib
          path: app/src/main/jniLibs/arm64-v8a/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build release APK
        run: gradle --no-daemon assembleRelease

      - name: Rename APK
        run: |
          mkdir -p dist
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" dist/app-arm64-v8a-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-release
          path: dist/app-arm64-v8a-release.apk
          if-no-files-found: error
